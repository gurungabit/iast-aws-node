<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <!-- Terminal screen background -->
    <rect x="4" y="8" width="56" height="40" rx="2" fill="#1a1a1a" stroke="#4a4a4a" stroke-width="2"/>

    <!-- Screen glow effect -->
    <rect x="8" y="12" width="48" height="32" rx="1" fill="#0a3a1a" opacity="0.3"/>

    <!-- Terminal text lines (green phosphor look) -->
    <line x1="12" y1="18" x2="28" y2="18" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="23" x2="36" y2="23" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="28" x2="24" y2="28" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="33" x2="32" y2="33" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="38" x2="20" y2="38" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Blinking cursor -->
    <rect x="22" y="37" width="2" height="3" fill="#00ff00">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Keyboard/base -->
    <rect x="2" y="50" width="60" height="10" rx="1" fill="#6a6a6a" stroke="#4a4a4a" stroke-width="1"/>

    <!-- Key indicators on keyboard -->
    <circle cx="10" cy="55" r="1.5" fill="#ff4444"/>
    <circle cx="16" cy="55" r="1.5" fill="#44ff44"/>
    <rect x="52" y="53" width="6" height="4" rx="0.5" fill="#4a4a4a"/>
</svg>
